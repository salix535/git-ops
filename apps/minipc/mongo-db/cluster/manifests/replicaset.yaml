apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: mongodb-rs
  namespace: mongodb
spec:
  members: 3
  type: ReplicaSet
  version: "8.0.23"

  security:
    authentication:
      modes: ["SCRAM"]
    tls:
      enabled: true
      # preferTLS: mongod accepts BOTH TLS and plaintext, so any existing
      # plaintext clients keep working. list-service connects over TLS via
      # mongodb+srv (driver defaults tls=true) trusting the private CA.
      optional: true
      certificateKeySecretRef:
        name: mongodb-tls   # cert-manager secret: tls.crt + tls.key
      caCertificateSecretRef:
        name: mongodb-tls   # same secret also carries ca.crt

  # NOTE: the shopping_app user is created MANUALLY on this cluster (not via
  # this CR), so it is intentionally absent from spec.users.
  users:
    - name: admin
      db: admin
      passwordSecretRef:
        name: mongodb-admin-password
      roles:
        - name: clusterAdmin
          db: admin
        - name: userAdminAnyDatabase
          db: admin
        - name: readWriteAnyDatabase
          db: admin
        - name: dbAdminAnyDatabase
          db: admin
      scramCredentialsSecretName: mongodb-admin-scram

  statefulSet:
    spec:
      template:
        spec:
          # Spread replicas across nodes — a single node loss must not
          # take down a majority.
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: app
                        operator: In
                        values:
                          - mongodb-rs-svc
                  topologyKey: kubernetes.io/hostname

          containers:
            - name: mongod
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: 2000m
                  memory: 2Gi
            - name: mongodb-agent
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi

      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 10Gi
            storageClassName: longhorn-strict-local
        - metadata:
            name: logs-volume
          spec:
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 2Gi
            storageClassName: longhorn-strict-local

  # Backups intentionally out of scope for this migration. MCK supports
  # backups via Ops Manager / Cloud Manager — wire that up separately.
