apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongodb-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"   # operator + CRDs install before the replica set (wave 1)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: minipcs
  sources:
    - repoURL: https://mongodb.github.io/helm-charts
      chart: mongodb-kubernetes
      targetRevision: 1.9.1
      helm:
        valueFiles:
          - $values/apps/minipc/mongo-db/operator/values.yaml
    - repoURL: https://github.com/salix535/git-ops
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: mongodb-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # MCK CRDs are large — same reason CNPG uses it
