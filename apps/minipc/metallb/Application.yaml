apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb-minipc
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: minipcs
  sources:
    - repoURL: https://metallb.github.io/metallb
      chart: metallb
      targetRevision: 0.16.1
      helm:
        releaseName: metallb
        valueFiles:
          - $values/apps/minipc/metallb/values.yaml

    - repoURL: https://github.com/salix535/git-ops
      targetRevision: main
      ref: values

    - repoURL: https://github.com/salix535/git-ops
      targetRevision: main
      path: apps/minipc/metallb/manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
