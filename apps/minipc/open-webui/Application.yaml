apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: open-webui
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: minipcs
  sources:
    - repoURL: https://helm.openwebui.com/
      chart: open-webui
      targetRevision: "15.2.0"
      helm:
        valueFiles:
          - $values/apps/minipc/open-webui/values.yaml
    - repoURL: https://github.com/salix535/git-ops
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: open-webui
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
