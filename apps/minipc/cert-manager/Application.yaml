apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    # Wave 0: cert-manager (CRDs + webhook) must be Healthy before any
    # Certificate / Issuer resources are applied in a later wave.
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: minipcs
  sources:
    - repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: v1.21.0
      helm:
        releaseName: cert-manager
        valueFiles:
          - $values/apps/minipc/cert-manager/values.yaml

    - repoURL: https://github.com/salix535/git-ops
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # cert-manager CRDs exceed the client-side last-applied annotation limit.
      - ServerSideApply=true
