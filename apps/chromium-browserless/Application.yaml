apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chromium-browserless
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: minipcs
  source:
    repoURL: https://github.com/salix535/git-ops
    targetRevision: main
    path: apps/chromium-browserless/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: open-webui
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
