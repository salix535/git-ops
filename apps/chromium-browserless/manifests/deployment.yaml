apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromium-browserless
  labels:
    app: chromium-browserless
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chromium-browserless
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: chromium-browserless
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      containers:
        - name: chromium
          image: ghcr.io/browserless/chromium:v2.51.0@sha256:fee73de217759eb4053358dc09818b9e9a6cf4a1d1269a0d2da487e0797e0a22
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: CONCURRENT
              value: "5"
            - name: TIMEOUT
              value: "30000"
            - name: QUEUED
              value: "10"
            - name: MAX_CONCURRENT_SESSIONS
              value: "5"
            - name: PRE_REQUEST_HEALTH_CHECK
              value: "true"
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  name: chromium-browserless-secret
                  key: token
          resources:
            requests:
              memory: 1Gi
              cpu: 500m
            limits:
              memory: 4Gi
              cpu: "2"
          securityContext:
            capabilities:
              add: ["SYS_ADMIN"]
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
