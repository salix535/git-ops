apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-agent
  labels:
    app: claude-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-agent
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: claude-agent
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: ghcr.io/salix535/claude-agent:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: claude-agent-secrets
                  key: GITHUB_APP_ID
            - name: GITHUB_APP_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: claude-agent-secrets
                  key: GITHUB_APP_INSTALLATION_ID
            - name: GITHUB_APP_KEY_PATH
              value: /home/agent/.claude/github-app-key.pem
            - name: HOME
              value: /home/agent
            - name: CLAUDE_CONFIG_DIR
              value: /home/agent/.claude
            - name: NODE_OPTIONS
              value: "--max-old-space-size=2048"
            - name: GITHUB_BOT_LOGIN
              value: best-clanker
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 3Gi
              cpu: "2"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: claude-home
              mountPath: /home/agent/.claude
            - name: repos-data
              mountPath: /data/repos
            - name: config
              mountPath: /etc/claude-agent
            - name: tmp-volume
              mountPath: /tmp
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: claude-home
          persistentVolumeClaim:
            claimName: claude-home-pvc
        - name: repos-data
          persistentVolumeClaim:
            claimName: repos-data-pvc
        - name: config
          configMap:
            name: claude-agent-config
        - name: tmp-volume
          emptyDir: {}
