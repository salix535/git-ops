---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-home-pvc
  labels:
    app: claude-agent
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: repos-data-pvc
  labels:
    app: claude-agent
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
