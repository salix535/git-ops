apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: raspberrypi
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Raspberry Pi home services applications
  sourceRepos:
    - https://github.com/salix535/git-ops
    - https://bitnami-labs.github.io/sealed-secrets
    - https://charts.bitnami.com/bitnami
    - https://mojo2600.github.io/pihole-kubernetes/
    - https://prometheus-community.github.io/helm-charts
    - ghcr.io/salix535/helm-charts
  destinations:
    - server: https://10.0.4.11:6443
      namespace: openclaw
    - server: https://10.0.4.11:6443
      namespace: sealed-secrets
    - server: https://10.0.4.11:6443
      namespace: n8n
    - server: https://10.0.4.11:6443
      namespace: claude-agent
    - server: https://10.0.4.11:6443
      namespace: agent-api
    - server: https://10.0.4.11:6443
      namespace: wordpress
    - server: https://10.0.4.11:6443
      namespace: searxng
    - server: https://10.0.4.11:6443
      namespace: pihole
    - server: https://10.0.4.11:6443
      namespace: monitoring
    - server: https://10.0.4.11:6443
      namespace: kube-system
    - server: https://10.0.4.11:6443
      namespace: update-monitoring
    - server: https://10.0.4.11:6443
      namespace: system-upgrade
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
