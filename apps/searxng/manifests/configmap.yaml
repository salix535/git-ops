apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  labels:
    app: searxng
data:
  settings.yml: |
    # Merges with the upstream defaults shipped in the image.
    use_default_settings:
      engines:
        keep_only:
          - google
          - bing
          - duckduckgo

    general:
      instance_name: "SearXNG"
      enable_metrics: false

    server:
      # Rotate this and move to a SealedSecret + SEARXNG_SECRET env var if exposed beyond LAN.
      secret_key: "change-me-internal-only-please-rotate-0d7a3c4e2f8b1a5c"
      limiter: false
      image_proxy: false
      method: "GET"

    search:
      safe_search: 0
      autocomplete: ""
      formats:
        - html
        - json

    ui:
      static_use_hash: true

    engines:
      - name: google
        disabled: false
      - name: bing
        disabled: false
      - name: duckduckgo
        disabled: false
