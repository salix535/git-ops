apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: list-service-production
  namespace: argocd
  annotations:
    # Wave 2: after cert-manager (0) and mongodb-cluster TLS (1), so mongod is
    # serving TLS before the app connects. NOTE: the app stays unhealthy until
    # MONGODB_CA_PEM is filled in list-service-prod.yaml (post cert issuance).
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: minipcs
  sources:
    - repoURL: ghcr.io/salix535/helm-charts
      chart: spring-boot
      targetRevision: "1.0.8"
      helm:
        valueFiles:
          - $appvalues/helm/values/base.yaml
          - $appvalues/helm/values/production.yaml
          # overlay lives OUTSIDE prod/ so it is referenced only, never rendered
          # as a manifest by the git source below.
          - $version/apps/list-service/list-service-prod.yaml

    - repoURL: https://github.com/salix535/ListService
      targetRevision: main
      ref: appvalues

    - repoURL: https://github.com/salix535/git-ops
      targetRevision: main
      path: apps/list-service/prod    # deploys all yaml files in this folder including sealed-secret.yaml
      ref: version

  destination:
    server: https://kubernetes.default.svc
    namespace: shopping-list-production

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true