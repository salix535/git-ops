# Prod overlay for list-service. Referenced as a Helm valueFile via $version in
# Application.yaml — NOT applied as a manifest (lives outside prod/).
#
# Layered over base.yaml + production.yaml. Adds the image tag, the prod Mongo
# CA (for the app's MongoTlsConfig), and host-based LAN ingress.
image:
  repository: "ghcr.io/salix535/list-service"
  tag: "0.2.0-47"          # build that includes MongoTlsConfig (shared w/ test)
  pullPolicy: IfNotPresent

# Private: host-based at root -> list-service.lan/ (traefik, no stripPrefix).
# Public: host-less subpath -> /list-service (traefik-public, stripPrefix), as
# before. chart >= 1.0.9 routes each ingress independently.
ingress:
  enabled: true
  host: "list-service.lan"
  path: "/"
  stripPrefix: false
  public:
    enabled: true
    host: ""
    path: "/list-service"
    stripPrefix: true

config:
  # Prod private CA (mongodb-rs-homelab-ca, minipc cluster). base64-encoded PEM;
  # the app's MongoTlsConfig decodes it into the Mongo driver's SSLContext.
  # FILL after prod cert-manager issues mongodb-tls:
  #   kubectl -n mongodb get secret mongodb-tls -o jsonpath='{.data.ca\.crt}'
  MONGODB_CA_PEM: ""
