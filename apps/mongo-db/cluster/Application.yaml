apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongodb-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"   # syncs after the operator (wave 0)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: minipcs
  source:
    repoURL: https://github.com/salix535/git-ops
    targetRevision: main
    path: apps/mongo-db/cluster/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: mongodb
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    # MCK writes defaults back into MongoDBCommunity.spec after we apply it.
    # Without this, Argo flags those as drift and selfHeal fights the operator.
    # Verify the manager string after first apply with:
    #   kubectl get mongodbcommunity mongodb-rs -n mongodb -o json \
    #     | jq '.metadata.managedFields[].manager'
    - group: mongodbcommunity.mongodb.com
      kind: MongoDBCommunity
      name: mongodb-rs
      namespace: mongodb
      managedFieldsManagers:
        - mongodb-kubernetes-operator
