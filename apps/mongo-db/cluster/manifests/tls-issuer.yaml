# Self-signed private CA for the mongodb-rs replica set TLS.
#
# Everything here is namespaced (Issuer, not ClusterIssuer) so the whole trust
# chain lives under the mongo-db app and needs NO AppProject
# clusterResourceWhitelist entry. Chain:
#
#   Issuer(selfSigned) -> Certificate(isCA) -> Secret(mongodb-ca-key-pair)
#                                            -> Issuer(ca) signs the leaf cert
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: mongodb-selfsigned
  namespace: mongodb
  annotations:
    # Inner waves (within the wave-1 mongodb-cluster app) provision the cert
    # chain BEFORE the MongoDBCommunity CR (default wave 0), so on a fresh
    # install mongodb-tls exists before mongod tries to serve TLS:
    #   -3 selfSigned issuer + CA cert  ->  -2 CA issuer  ->  -1 leaf cert  ->  0 CR
    argocd.argoproj.io/sync-wave: "-3"
spec:
  selfSigned: {}
---
# The private CA itself (10-year key pair). This ca.crt is what clients that
# need to trust mongod's TLS cert (e.g. list-service) must be given.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mongodb-ca
  namespace: mongodb
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  isCA: true
  commonName: mongodb-rs-homelab-ca
  secretName: mongodb-ca-key-pair
  duration: 87600h   # 10 years
  renewBefore: 720h  # 30 days
  privateKey:
    algorithm: RSA
    size: 4096
  issuerRef:
    name: mongodb-selfsigned
    kind: Issuer
---
# CA issuer — signs the leaf cert below using the CA key pair.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: mongodb-ca-issuer
  namespace: mongodb
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  ca:
    secretName: mongodb-ca-key-pair
