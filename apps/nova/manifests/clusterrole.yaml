# Read-only, cluster-wide access for nova.
# Note: secrets cluster-wide is required because Helm v3 stores release
# metadata (including rendered values) as Secrets in each release's namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nova-reader
rules:
  - apiGroups: [""]
    resources:
      - secrets
      - configmaps
      - namespaces
      - pods
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list"]
