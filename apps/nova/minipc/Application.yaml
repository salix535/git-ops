apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nova-minipc
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: minipcs
  source:
    repoURL: https://github.com/salix535/git-ops
    targetRevision: main
    path: apps/nova/minipc
  destination:
    server: https://kubernetes.default.svc
    namespace: update-monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
