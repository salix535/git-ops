apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pihole-rpi3
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://mojo2600.github.io/pihole-kubernetes/
      chart: pihole
      targetRevision: "2.35.0"
      helm:
        valueFiles:
          - $values/apps/pihole/rpi3-values.yaml
    - repoURL: https://github.com/salix535/git-ops
      targetRevision: main
      path: apps/pihole
      ref: values
  destination:
    server: https://10.0.4.11:6443
    namespace: pihole
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
