apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack-rpi
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: raspberrypi
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 86.2.2
      helm:
        valueFiles:
          - $values/apps/monitoring/kube-prometheus-stack-rpi/values.yaml

    - repoURL: https://github.com/salix535/git-ops
      targetRevision: main
      ref: values

    - repoURL: https://github.com/salix535/git-ops
      targetRevision: main
      path: apps/monitoring/kube-prometheus-stack-rpi/manifests

  destination:
    server: https://10.0.4.11:6443
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
